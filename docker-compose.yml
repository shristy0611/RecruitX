services:
  postgres:
    image: postgres:15-alpine
    container_name: recruitx_postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-recruitx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your_postgres_password}
      POSTGRES_DB: ${POSTGRES_DB:-recruitx_dev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recruitx} -d ${POSTGRES_DB:-recruitx_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  weaviate:
    image: semitechnologies/weaviate:1.22.3
    container_name: recruitx_weaviate
    restart: unless-stopped
    ports:
      - "${WEAVIATE_PORT:-8080}:8080"
    volumes:
      - weaviate_data:/var/lib/weaviate
    environment:
      QUERY_DEFAULTS_LIMIT: 20
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "text2vec-transformers"
      ENABLE_MODULES: "text2vec-transformers"
      TRANSFORMERS_INFERENCE_API: "http://t2v-transformers:8080"
      CLUSTER_HOSTNAME: "node1"
    depends_on:
      - t2v-transformers
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  t2v-transformers:
    image: semitechnologies/transformers-inference:sentence-transformers-all-MiniLM-L6-v2
    container_name: recruitx_transformers
    restart: unless-stopped
    environment:
      ENABLE_CUDA: "0"

  redis:
    image: redis:7-alpine
    container_name: recruitx_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:latest
    container_name: recruitx_localstack
    restart: unless-stopped
    ports:
      - "${LOCALSTACK_EDGE_PORT:-4566}:4566"          # Edge port for all services
      - "${LOCALSTACK_ELASTICMQ_PORT:-4576}:4576"    # For SQS (if needed directly)
    environment:
      - SERVICES=s3,sqs,sns,lambda,dynamodb,iam,sts # Add services as needed
      - DEBUG=${DEBUG:-0}
      - DATA_DIR=/tmp/localstack/data
      - DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - EAGER_SERVICE_LOADING=1
      - LS_LOG=info # Or 'trace' for detailed logs
    volumes:
      - localstack_data:/tmp/localstack
      - "/var/run/docker.sock:/var/run/docker.sock"

  minio:
    image: minio/minio:latest
    container_name: recruitx_minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"      # API port
      - "${MINIO_CONSOLE_PORT:-9001}:9001"  # Console UI port
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-your_minio_password}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${MINIO_API_PORT:-9000}/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  localstack_data:
    driver: local
  minio_data:
    driver: local
  weaviate_data:
    driver: local
